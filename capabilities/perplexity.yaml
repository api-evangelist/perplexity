naftiko: 1.0.0-alpha2
info:
  label: Perplexity AI API
  description: 'Perplexity AI API. 9 operations. Lead operation: Search the Web. Self-contained Naftiko capability covering
    one Perplexity business surface.'
  tags:
  - Perplexity
  - Perplexity AI API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PERPLEXITY_API_KEY: PERPLEXITY_API_KEY
capability:
  consumes:
  - type: http
    namespace: perplexity
    baseUri: https://api.perplexity.ai
    description: Perplexity AI API business capability. Self-contained, no shared references.
    resources:
    - name: search
      path: /search
      operations:
      - name: searchsearchpost
        method: POST
        description: Search the Web
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-agent
      path: /v1/agent
      operations:
      - name: createagent
        method: POST
        description: Create Agent Response
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-async-sonar
      path: /v1/async/sonar
      operations:
      - name: listasyncchatcompletionsasyncchatcompletionsget
        method: GET
        description: List Async Chat Completions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createasyncchatcompletionsasyncchatcompletionspost
        method: POST
        description: Create Async Chat Completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-async-sonar-api_request
      path: /v1/async/sonar/{api_request}
      operations:
      - name: getasyncchatcompletionresponseasyncchatcompletionsapirequestget
        method: GET
        description: Get Async Chat Completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api_request
          in: path
          type: string
          required: true
    - name: v1-contextualizedembeddings
      path: /v1/contextualizedembeddings
      operations:
      - name: contextualizedembeddingsv1contextualizedembeddingspost
        method: POST
        description: Create Contextualized Embeddings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-embeddings
      path: /v1/embeddings
      operations:
      - name: embeddingsv1embeddingspost
        method: POST
        description: Create Embeddings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-models
      path: /v1/models
      operations:
      - name: listmodels
        method: GET
        description: List Models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-sonar
      path: /v1/sonar
      operations:
      - name: chatcompletionschatcompletionspost
        method: POST
        description: Create Chat Completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PERPLEXITY_API_KEY}}'
  exposes:
  - type: rest
    namespace: perplexity-rest
    port: 8080
    description: REST adapter for Perplexity AI API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/search
      name: search
      description: REST surface for search.
      operations:
      - method: POST
        name: searchsearchpost
        description: Search the Web
        call: perplexity.searchsearchpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/agent
      name: v1-agent
      description: REST surface for v1-agent.
      operations:
      - method: POST
        name: createagent
        description: Create Agent Response
        call: perplexity.createagent
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/async/sonar
      name: v1-async-sonar
      description: REST surface for v1-async-sonar.
      operations:
      - method: GET
        name: listasyncchatcompletionsasyncchatcompletionsget
        description: List Async Chat Completions
        call: perplexity.listasyncchatcompletionsasyncchatcompletionsget
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createasyncchatcompletionsasyncchatcompletionspost
        description: Create Async Chat Completion
        call: perplexity.createasyncchatcompletionsasyncchatcompletionspost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/async/sonar/{api-request}
      name: v1-async-sonar-api-request
      description: REST surface for v1-async-sonar-api_request.
      operations:
      - method: GET
        name: getasyncchatcompletionresponseasyncchatcompletionsapirequestget
        description: Get Async Chat Completion
        call: perplexity.getasyncchatcompletionresponseasyncchatcompletionsapirequestget
        with:
          api_request: rest.api_request
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/contextualizedembeddings
      name: v1-contextualizedembeddings
      description: REST surface for v1-contextualizedembeddings.
      operations:
      - method: POST
        name: contextualizedembeddingsv1contextualizedembeddingspost
        description: Create Contextualized Embeddings
        call: perplexity.contextualizedembeddingsv1contextualizedembeddingspost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/embeddings
      name: v1-embeddings
      description: REST surface for v1-embeddings.
      operations:
      - method: POST
        name: embeddingsv1embeddingspost
        description: Create Embeddings
        call: perplexity.embeddingsv1embeddingspost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/models
      name: v1-models
      description: REST surface for v1-models.
      operations:
      - method: GET
        name: listmodels
        description: List Models
        call: perplexity.listmodels
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/sonar
      name: v1-sonar
      description: REST surface for v1-sonar.
      operations:
      - method: POST
        name: chatcompletionschatcompletionspost
        description: Create Chat Completion
        call: perplexity.chatcompletionschatcompletionspost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: perplexity-mcp
    port: 9090
    transport: http
    description: MCP adapter for Perplexity AI API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: search-web
      description: Search the Web
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: perplexity.searchsearchpost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-agent-response
      description: Create Agent Response
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: perplexity.createagent
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-async-chat-completions
      description: List Async Chat Completions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: perplexity.listasyncchatcompletionsasyncchatcompletionsget
      outputParameters:
      - type: object
        mapping: $.
    - name: create-async-chat-completion
      description: Create Async Chat Completion
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: perplexity.createasyncchatcompletionsasyncchatcompletionspost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-async-chat-completion
      description: Get Async Chat Completion
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: perplexity.getasyncchatcompletionresponseasyncchatcompletionsapirequestget
      with:
        api_request: tools.api_request
      outputParameters:
      - type: object
        mapping: $.
    - name: create-contextualized-embeddings
      description: Create Contextualized Embeddings
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: perplexity.contextualizedembeddingsv1contextualizedembeddingspost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-embeddings
      description: Create Embeddings
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: perplexity.embeddingsv1embeddingspost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-models
      description: List Models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: perplexity.listmodels
      outputParameters:
      - type: object
        mapping: $.
    - name: create-chat-completion
      description: Create Chat Completion
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: perplexity.chatcompletionschatcompletionspost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
