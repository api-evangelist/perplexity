    note: Sonar chat completions; documents stream and stream_mode parameters.
  - url: https://docs.perplexity.ai/docs/sonar/pro-search/stream-mode.md
    type: Documentation
    note: Defines `full` and `concise` stream modes and the four concise event types.
  - url: https://docs.perplexity.ai/docs/sonar/features.md
    type: Documentation
    note: Confirms search_results, usage, and metadata arrive in final chunk(s).
  - url: https://docs.perplexity.ai/api-reference/agent-post.md
    type: APIReference
    note: Lists 14 typed SSE events for Agent API streaming.
  - url: https://docs.perplexity.ai/docs/agent-api/output-control.md
    type: Documentation
    note: Agent API streaming output control.
  - url: https://docs.perplexity.ai/docs/cookbook/articles/streaming-citations/README.md
    type: Documentation
    note: Streaming citations consumption pattern for Agent API.
  - url: https://docs.perplexity.ai/api-reference/async-sonar-post.md
    type: APIReference
    note: Async Sonar enqueue (POST) + polling (GET) pattern. Not SSE.
actions:
  asyncapiPath: asyncapi/perplexity-asyncapi.yml
  apisYmlUpdated: true
  reason: |
    SSE is in-scope for AsyncAPI modeling per updated scope. The spec uses
    AsyncAPI 2.6 with the `http` protocol binding and includes explicit
    in-document statements that transport is HTTP+SSE, not WebSocket.
