    type: Documentation
    note: Documentation hub.
  - url: https://docs.perplexity.ai/llms.txt
    type: LLMs TXT
    note: Complete documentation index of streaming, async, chat, sonar, agent, search, embeddings docs.
  - url: https://docs.perplexity.ai/api-reference/chat-completions-post
    type: APIReference
    note: Documents `stream` parameter as "If true, returns streaming SSE response."
  - url: https://docs.perplexity.ai/api-reference/sonar-post.md
